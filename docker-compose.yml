# =============================================================================
# Cal AI Clone — Docker Compose (default / staging)
# =============================================================================
# Usage:  docker compose up --build
# =============================================================================

networks:
  calai_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    networks:
      - calai_network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-calapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-calapp_secret}
      POSTGRES_DB: ${POSTGRES_DB:-calendar_db}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-calapp} -d ${POSTGRES_DB:-calendar_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Do NOT expose 5432 externally — only the backend needs it via the network.

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - calai_network
    volumes:
      - redis_data:/data
    command: >
      redis-server
        --save 60 1
        --loglevel warning
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - calai_network
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - ./backend/.env
    environment:
      # Override DB/Redis URLs so they resolve inside the Docker network.
      DATABASE_URL: "postgresql://${POSTGRES_USER:-calapp}:${POSTGRES_PASSWORD:-calapp_secret}@db:5432/${POSTGRES_DB:-calendar_db}"
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
