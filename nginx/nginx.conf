# =============================================================================
# Fitsi — Nginx Reverse Proxy Configuration (production)
# =============================================================================
# This file is mounted into the nginx container at /etc/nginx/nginx.conf.
# For single-server / VPS deployments. In AWS, you would use ALB instead.
# =============================================================================

worker_processes auto;
worker_rlimit_nofile 65535;
pid /run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # ── Basic settings ────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;  # Hide nginx version in headers

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format json_combined escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"http_referer":"$http_referer",'
        '"http_user_agent":"$http_user_agent"'
    '}';

    access_log /var/log/nginx/access.log json_combined;
    error_log /var/log/nginx/error.log warn;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        text/css
        text/plain
        text/xml
        application/xml;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=ai_scan_limit:10m rate=2r/s;
    limit_req_status 429;

    # ── Upstream: FastAPI backend ─────────────────────────────────────────────
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Let health checks pass on HTTP
        location /health {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # Everything else redirects to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server ──────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.fitsi.app;

        # ── SSL certificates (mount via volume or use certbot) ────────────────
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # ── SSL hardening ─────────────────────────────────────────────────────
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # ── Security headers ─────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── Request size limit (image uploads) ────────────────────────────────
        client_max_body_size 10m;

        # ── Health check (no rate limit) ──────────────────────────────────────
        location = /health {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            access_log off;
        }

        # ── Auth endpoints — stricter rate limit ──────────────────────────────
        # Backend auth router is at /auth/* (not /api/auth/)
        location /auth/ {
            limit_req zone=auth_limit burst=10 nodelay;
            proxy_pass http://backend;
            include /etc/nginx/proxy_params_fitsi;
        }

        # ── AI food scan — expensive API calls, tight rate limit ─────────────
        # Backend AI food router is at /api/food/*
        location /api/food/ {
            limit_req zone=ai_scan_limit burst=5 nodelay;
            client_max_body_size 10m;
            proxy_pass http://backend;
            include /etc/nginx/proxy_params_fitsi;
        }

        # ── API endpoints ─────────────────────────────────────────────────────
        location / {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://backend;
            include /etc/nginx/proxy_params_fitsi;
        }
    }
}
