# =============================================================================
# Fitsi IA — Docker Compose PRODUCTION overlay
# =============================================================================
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# In production you would typically:
#   1. Push the image to a registry (ECR, GHCR, Docker Hub).
#   2. Deploy via ECS/Fargate, Kubernetes, or a managed service.
#   3. Use managed PostgreSQL (RDS) and Redis (ElastiCache) instead of containers.
#
# This file is provided as a reference for single-server / VPS deployments.
# =============================================================================

services:
  db:
    restart: always
    environment:
      # In real production, set these via secrets, not inline.
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Use read-only tmpfs for ephemeral data, persist only the PG data dir.
    tmpfs:
      - /tmp
      - /run
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 512M

  redis:
    restart: always
    command: >
      redis-server
        --save 300 1
        --loglevel notice
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --requirepass ${REDIS_PASSWORD:-}
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M

  backend:
    restart: always
    # In production use a pre-built image from a registry:
    # image: ghcr.io/fitsiai/backend:${IMAGE_TAG:-latest}
    environment:
      ENV: production
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-}@redis:6379/0"
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
      GUNICORN_LOG_LEVEL: warning
    # Graceful shutdown: give gunicorn time to finish in-flight requests
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 60s
    # Read-only filesystem — app writes nothing to disk.
    read_only: true
    tmpfs:
      - /tmp
    # Security hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # ── Nginx reverse proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: always
    networks:
      - fitsiai_network
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/proxy_params_fitsiai:/etc/nginx/proxy_params_fitsiai:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      # Use wget instead of curl — curl is not installed in nginx:alpine
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

networks:
  fitsiai_network:
    driver: bridge
