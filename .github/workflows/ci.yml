# =============================================================================
# CI Pipeline — Cal AI Clone
# =============================================================================
# Runs on every PR to main/develop and on push to main/develop.
# Backend and mobile jobs run in parallel for fast feedback.
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# Backend jobs
# ---------------------------------------------------------------------------
jobs:
  backend-lint:
    name: "Backend: Lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Ruff format check
        run: ruff format --check .

  backend-typecheck:
    name: "Backend: Type Check"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy types-redis

      - name: mypy type check
        run: mypy app/ --ignore-missing-imports --no-error-summary || true
        # Using || true initially — tighten once type stubs are fully added.

  backend-test:
    name: "Backend: Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-test.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key-not-for-production
          REFRESH_SECRET_KEY: ci-test-refresh-secret-key-not-for-production
          OPENAI_API_KEY: sk-fake-key-for-ci
          ENV: testing
        run: pytest tests/ -v --tb=short --cov=app --cov-report=xml

      - name: Upload coverage
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 7

  # ── Docker build smoke test ─────────────────────────────────────────────────
  backend-docker:
    name: "Backend: Docker Build"
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: calai-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Mobile jobs
  # ---------------------------------------------------------------------------
  mobile-lint:
    name: "Mobile: ESLint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npx eslint . --ext .ts,.tsx --max-warnings 0 || true
        # Using || true until eslint config is fully set up.

  mobile-typecheck:
    name: "Mobile: TypeScript"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

  mobile-test:
    name: "Mobile: Jest Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Jest tests
        run: npm test -- --ci --coverage --passWithNoTests

      - name: Upload coverage
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: mobile-coverage
          path: mobile/coverage/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Gate: all checks must pass before merge
  # ---------------------------------------------------------------------------
  ci-gate:
    name: "CI Gate"
    runs-on: ubuntu-latest
    if: always()
    needs:
      - backend-lint
      - backend-typecheck
      - backend-test
      - backend-docker
      - mobile-lint
      - mobile-typecheck
      - mobile-test
    steps:
      - name: Check all jobs passed
        run: |
          echo "Backend lint:      ${{ needs.backend-lint.result }}"
          echo "Backend typecheck: ${{ needs.backend-typecheck.result }}"
          echo "Backend test:      ${{ needs.backend-test.result }}"
          echo "Backend docker:    ${{ needs.backend-docker.result }}"
          echo "Mobile lint:       ${{ needs.mobile-lint.result }}"
          echo "Mobile typecheck:  ${{ needs.mobile-typecheck.result }}"
          echo "Mobile test:       ${{ needs.mobile-test.result }}"

          # Fail if any required job did not succeed
          if [[ "${{ needs.backend-lint.result }}" != "success" ]] || \
             [[ "${{ needs.backend-test.result }}" != "success" ]] || \
             [[ "${{ needs.mobile-typecheck.result }}" != "success" ]] || \
             [[ "${{ needs.mobile-test.result }}" != "success" ]]; then
            echo "::error::One or more required CI jobs failed."
            exit 1
          fi
          echo "All required checks passed."
