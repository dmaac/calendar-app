# =============================================================================
# Deploy Pipeline — Fitsi IA Backend
# =============================================================================
# Triggers on push to main (after CI passes).
# Builds the Docker image, pushes to GHCR, and optionally deploys.
# =============================================================================

name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "docker-compose.yml"
      - "docker-compose.prod.yml"
      - "nginx/**"
      - ".github/workflows/deploy.yml"

  # Allow manual trigger for rollback / re-deploy
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false  # Never cancel an in-flight deploy

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend

jobs:
  # ---------------------------------------------------------------------------
  # 1. Run CI checks (reuse the CI workflow)
  # ---------------------------------------------------------------------------
  ci:
    name: "CI Checks"
    uses: ./.github/workflows/ci.yml

  # ---------------------------------------------------------------------------
  # 2. Build and push Docker image
  # ---------------------------------------------------------------------------
  build-and-push:
    name: "Build & Push Image"
    runs-on: ubuntu-latest
    needs: [ci]
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ---------------------------------------------------------------------------
  # 3. Deploy to staging (automatic on push to main)
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: "Deploy to Staging"
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://api-staging.fitsiai.app
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          echo "Deploying image: $IMAGE_TAG to staging"
          # ─────────────────────────────────────────────────────────────────
          # Replace this section with your actual deploy command.
          # Examples:
          #
          # SSH to VPS:
          #   ssh deploy@staging.fitsiai.app "cd /opt/fitsiai && docker compose pull && docker compose up -d"
          #
          # AWS ECS:
          #   aws ecs update-service --cluster fitsiai-staging --service backend --force-new-deployment
          #
          # Kubernetes:
          #   kubectl set image deployment/backend backend=$IMAGE_TAG -n staging
          # ─────────────────────────────────────────────────────────────────
          echo "Staging deploy placeholder — configure actual deployment target."

      - name: Verify health check
        run: |
          echo "Waiting for staging to become healthy..."
          # Uncomment when staging URL is live:
          # for i in $(seq 1 30); do
          #   STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api-staging.fitsiai.app/health || true)
          #   if [ "$STATUS" = "200" ]; then
          #     echo "Staging is healthy."
          #     exit 0
          #   fi
          #   echo "Attempt $i: status=$STATUS, retrying in 10s..."
          #   sleep 10
          # done
          # echo "::error::Staging health check failed after 5 minutes."
          # exit 1
          echo "Health check placeholder — enable once staging is live."

  # ---------------------------------------------------------------------------
  # 4. Deploy to production (manual workflow_dispatch only)
  # ---------------------------------------------------------------------------
  deploy-production:
    name: "Deploy to Production"
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://api.fitsiai.app
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          echo "Deploying image: $IMAGE_TAG to production"
          # Replace with actual production deploy command (see staging examples above).
          echo "Production deploy placeholder — configure actual deployment target."

      - name: Verify health check
        run: |
          echo "Production health check placeholder — enable once production is live."

      - name: Notify on success
        if: success()
        run: |
          echo "Production deployment succeeded."
          # Add Slack/Discord/PagerDuty notification here.

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Production deployment FAILED. Initiate rollback."
          # Add Slack/PagerDuty alert here.
