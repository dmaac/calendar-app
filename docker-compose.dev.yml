# =============================================================================
# Cal AI Clone — Docker Compose DEVELOPMENT overlay
# =============================================================================
# Usage:  docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# What this overlay adds:
#   - Exposed DB and Redis ports for local tooling (pgAdmin, redis-cli, etc.)
#   - Hot-reload via source mount + uvicorn --reload
#   - No gunicorn, no tini — fast iteration loop
# =============================================================================

services:
  db:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  backend:
    # Override CMD to run uvicorn with hot-reload instead of gunicorn
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --reload
        --reload-dir /app/app
    volumes:
      # Mount source code so changes are reflected immediately
      - ./backend/app:/app/app
    environment:
      ENV: development
